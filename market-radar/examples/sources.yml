    kind: rss
    url: "https://example.com/local-business/rss.xml"
    reason: "Local business moves can reveal competitor openings or customer demand shifts."

  - id: competitor-homepage
    kind: website
    url: "https://competitor.example.com"
    reason: "Competitor homepage changes can reveal territory, pricing, or offer changes."

  - id: trade-association
    kind: website
